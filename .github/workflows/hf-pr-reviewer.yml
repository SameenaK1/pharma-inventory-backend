name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 1. Provide BOTH key formats to bypass the strict OpenAI validation check
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_KEY: ${{ secrets.HF_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          # 2. Add the custom LLM provider indicator so LiteLLM maps the keys correctly
          LITELM_CUSTOM_LLM_PROVIDER: "huggingface"
          
          # 3. Use the OpenAI-compatible Hugging Face Router endpoint
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1/"
          
          # 4. Use your Hugging Face model
          OPENAI_MODEL: "meta-llama/Meta-Llama-3-70B-Instruct"
