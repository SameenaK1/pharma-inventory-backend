name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Pass the Hugging Face token as the standard OpenAI API Key
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          
          # REMOVED trailing slash to prevent malformed endpoint URLs
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1"
          
          # PREPENDED 'openai/' to force LiteLLM to use the custom base URL smoothly
          OPENAI_MODEL: "openai/meta-llama/Meta-Llama-3-70B-Instruct"
          
          # Flow control commands
          PR_ACTION: "/review"
          github_action.auto_review: "true"
