name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          # Double-check that this is exactly matched
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1"
          
          # Flow control commands
          PR_ACTION: "/review"
          github_action.auto_review: "true"
