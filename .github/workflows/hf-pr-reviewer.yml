name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Authentication
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_KEY: ${{ secrets.HF_TOKEN }}
          
          # Force LiteLLM to use the OpenAI-compatible Hugging Face endpoint
          LITELM_CUSTOM_LLM_PROVIDER: "openai"
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1"
          
          # Global fallback structures that override pr-agent configurations completely
          CONFIG_MODEL: "meta-llama/Meta-Llama-3-70B-Instruct"
          CONFIG_FALLBACK_MODELS: "['meta-llama/Meta-Llama-3-70B-Instruct']"
          
          # Explicit tool overrides to ensure it updates the specific /review modules
          PR_REVIEWER_MODEL: "meta-llama/Meta-Llama-3-70B-Instruct"
          
          # Workflow directives
          PR_ACTION: "/review"
          github_action.auto_review: "true"
