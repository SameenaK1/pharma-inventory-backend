name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Authentication variables
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_KEY: ${{ secrets.HF_TOKEN }}
          
          # Force LiteLLM to interpret endpoint structure natively
          LITELM_CUSTOM_LLM_PROVIDER: "huggingface"
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1/"
          OPENAI_MODEL: "meta-llama/Meta-Llama-3-70B-Instruct"
          
          # CRUCIAL: Tells the agent to actively execute the review tool
          # and forces it to run on push events ('synchronize')
          PR_ACTION: "/review"
          github_action.auto_review: "true"
