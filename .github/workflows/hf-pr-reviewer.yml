name: Hugging Face PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

# 👇 ADD THIS BLOCK TO ENABLE WRITING COMMENTS
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Reviewer Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_API_KEY: ${{ secrets.HF_TOKEN }}
          OPENAI_API_BASE: "https://api-inference.huggingface.co/v1" 
          CONFIG.MODEL: "meta-llama/Meta-Llama-3-70B-Instruct"
